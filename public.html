<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocuCloud — Sistem Pengarsipan Dokumen Modern untuk Tim Anda</title>
<meta name="description" content="DocuCloud adalah platform pengarsipan dokumen modern terintegrasi Google Drive. Kelola, bagikan, dan amankan dokumen perusahaan dengan mudah.">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
  [x-cloak] { display: none !important; }
  .scrollbar::-webkit-scrollbar { width: 6px; }
  .scrollbar::-webkit-scrollbar-thumb { background: rgba(148,163,184,.4); border-radius: 10px; }
  .glass { backdrop-filter: blur(16px); background: rgba(255,255,255,.75); }
  .dark .glass { background: rgba(15,23,42,.75); }
  .gradient-bg { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); }
  .gradient-text { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .fade-in { animation: fadeIn .6s ease both; }
  .fade-up { animation: fadeUp .7s ease both; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .blob {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: .35;
    animation: float 20s infinite ease-in-out;
  }
  @keyframes float {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px,-60px) scale(1.1); }
    66% { transform: translate(-30px,40px) scale(.9); }
  }
  .card-hover { transition: all .3s ease; }
  .card-hover:hover { transform: translateY(-6px); box-shadow: 0 20px 40px -10px rgba(102,126,234,.3); }
  .marquee { display: flex; animation: marquee 30s linear infinite; }
  @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  .pulse-dot { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .watermark {
    position: absolute; inset: 0; pointer-events: none;
    background-image: repeating-linear-gradient(45deg, transparent, transparent 100px, rgba(100,116,139,.08) 100px, rgba(100,116,139,.08) 101px);
  }
  .shine { position: relative; overflow: hidden; }
  .shine::after {
    content:''; position:absolute; top:0; left:-100%; width:50%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
    transition: left .6s ease;
  }
  .shine:hover::after { left: 120%; }
</style>
</head>
<body class="bg-white dark:bg-slate-950 text-slate-800 dark:text-slate-200 overflow-x-hidden"
      x-data="publicSite()" x-init="init()" x-cloak
      :class="{'dark': darkMode}">

<!-- ================== LANDING PAGE ================== -->
<template x-if="view === 'home'">
<div class="min-h-screen">

  <!-- NAVBAR -->
  <nav :class="scrolled ? 'glass shadow-sm' : 'bg-transparent'" class="fixed top-0 w-full z-40 transition-all duration-300 border-b border-slate-200/50 dark:border-slate-800/50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="#" @click.prevent="view='home'" class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-xl gradient-bg flex items-center justify-center">
          <i data-lucide="cloud-cog" class="w-5 h-5 text-white"></i>
        </div>
        <span class="font-bold text-lg">DocuCloud</span>
      </a>

      <div class="hidden md:flex items-center gap-8">
        <a href="#features" class="text-sm font-medium hover:text-indigo-600 transition">Fitur</a>
        <a href="#how" class="text-sm font-medium hover:text-indigo-600 transition">Cara Kerja</a>
        <a href="#pricing" class="text-sm font-medium hover:text-indigo-600 transition">Harga</a>
        <a href="#testimonials" class="text-sm font-medium hover:text-indigo-600 transition">Testimoni</a>
        <a href="#faq" class="text-sm font-medium hover:text-indigo-600 transition">FAQ</a>
      </div>

      <div class="flex items-center gap-2">
        <button @click="darkMode = !darkMode" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
          <i :data-lucide="darkMode ? 'sun' : 'moon'" class="w-4 h-4"></i>
        </button>
        <button @click="showAuth = true; authTab='login'" class="hidden sm:block text-sm font-medium px-4 py-2 hover:text-indigo-600">Masuk</button>
        <button @click="showAuth = true; authTab='register'" class="shine px-4 py-2 gradient-bg text-white rounded-lg text-sm font-semibold">Coba Gratis</button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="relative pt-32 pb-20 px-6 overflow-hidden">
    <div class="blob bg-indigo-500 w-96 h-96 top-10 -left-20"></div>
    <div class="blob bg-purple-500 w-96 h-96 top-40 right-0" style="animation-delay:-7s"></div>
    <div class="blob bg-pink-400 w-72 h-72 bottom-0 left-1/3" style="animation-delay:-14s"></div>

    <div class="relative max-w-7xl mx-auto text-center">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-indigo-50 dark:bg-indigo-500/10 border border-indigo-200 dark:border-indigo-500/30 rounded-full text-xs font-medium text-indigo-600 dark:text-indigo-400 mb-6 fade-up">
        <span class="w-2 h-2 rounded-full bg-green-500 pulse-dot"></span>
        🚀 Versi 2.4 — Integrasi Google Drive Resmi Dirilis
      </div>

      <h1 class="text-5xl md:text-7xl font-black tracking-tight leading-[1.05] fade-up" style="animation-delay:.1s">
        Arsip dokumen tim Anda<br>
        <span class="gradient-text">modern, aman, terintegrasi.</span>
      </h1>

      <p class="mt-6 text-lg md:text-xl text-slate-600 dark:text-slate-400 max-w-2xl mx-auto fade-up" style="animation-delay:.2s">
        DocuCloud menyatukan seluruh dokumen perusahaan dalam satu dashboard elegan.
        Upload, cari, bagikan, dan kolaborasi — semuanya terhubung langsung ke Google Drive.
      </p>

      <div class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-3 fade-up" style="animation-delay:.3s">
        <button @click="showAuth = true; authTab='register'" class="shine w-full sm:w-auto px-8 py-4 gradient-bg text-white rounded-xl font-semibold flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/30">
          Mulai Gratis 14 Hari
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
        <button @click="view='demo-doc'; loadDemoDoc()" class="w-full sm:w-auto px-8 py-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl font-semibold flex items-center justify-center gap-2 hover:bg-slate-50 dark:hover:bg-slate-800">
          <i data-lucide="play-circle" class="w-4 h-4"></i>
          Lihat Demo Dokumen Publik
        </button>
      </div>

      <!-- Trust Bar -->
      <div class="mt-12 flex items-center justify-center gap-6 text-xs text-slate-500 fade-up" style="animation-delay:.4s">
        <div class="flex items-center gap-1.5"><i data-lucide="shield-check" class="w-4 h-4 text-green-500"></i> ISO 27001</div>
        <div class="flex items-center gap-1.5"><i data-lucide="lock" class="w-4 h-4 text-indigo-500"></i> End-to-End Encryption</div>
        <div class="flex items-center gap-1.5"><i data-lucide="check-circle" class="w-4 h-4 text-green-500"></i> GDPR Compliant</div>
      </div>

      <!-- Hero Preview -->
      <div class="relative mt-16 max-w-5xl mx-auto fade-up" style="animation-delay:.5s">
        <div class="absolute -inset-4 gradient-bg rounded-3xl blur-2xl opacity-20"></div>
        <div class="relative bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
          <div class="flex items-center gap-2 px-4 py-3 bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
            <div class="flex gap-1.5">
              <div class="w-3 h-3 rounded-full bg-red-400"></div>
              <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
              <div class="w-3 h-3 rounded-full bg-green-400"></div>
            </div>
            <div class="flex-1 text-center text-xs text-slate-400">docucloud.app/dashboard</div>
          </div>
          <div class="grid grid-cols-4 gap-3 p-5">
            <div class="col-span-1 space-y-2">
              <div class="h-8 bg-slate-100 dark:bg-slate-800 rounded-lg"></div>
              <div class="h-6 bg-indigo-500/20 rounded-lg"></div>
              <div class="h-6 bg-slate-100 dark:bg-slate-800 rounded-lg"></div>
              <div class="h-6 bg-slate-100 dark:bg-slate-800 rounded-lg"></div>
              <div class="h-6 bg-slate-100 dark:bg-slate-800 rounded-lg"></div>
            </div>
            <div class="col-span-3 space-y-3">
              <div class="grid grid-cols-4 gap-2">
                <div class="h-16 bg-indigo-100 dark:bg-indigo-500/20 rounded-lg"></div>
                <div class="h-16 bg-green-100 dark:bg-green-500/20 rounded-lg"></div>
                <div class="h-16 bg-yellow-100 dark:bg-yellow-500/20 rounded-lg"></div>
                <div class="h-16 bg-purple-100 dark:bg-purple-500/20 rounded-lg"></div>
              </div>
              <div class="grid grid-cols-5 gap-2">
                <template x-for="i in 10" :key="i">
                  <div class="aspect-square rounded-lg" :class="i%3===0?'bg-red-100 dark:bg-red-500/20':i%3===1?'bg-blue-100 dark:bg-blue-500/20':'bg-slate-100 dark:bg-slate-800'"></div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- STATS -->
  <section class="py-12 px-6 border-y border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
      <template x-for="s in stats" :key="s.label">
        <div>
          <p class="text-4xl md:text-5xl font-black gradient-text" x-text="s.value"></p>
          <p class="text-sm text-slate-500 mt-2" x-text="s.label"></p>
        </div>
      </template>
    </div>
  </section>

  <!-- CLIENTS MARQUEE -->
  <section class="py-10 px-6 overflow-hidden">
    <p class="text-center text-xs uppercase tracking-widest text-slate-400 mb-6">Dipercaya oleh 500+ perusahaan</p>
    <div class="relative">
      <div class="marquee gap-16 whitespace-nowrap">
        <template x-for="i in 2" :key="i">
          <div class="flex gap-16 items-center">
            <template x-for="c in ['TOKOPEDIA','GOJEK','BUKALAPAK','TELKOM','BCA','MANDIRI','PERTAMINA','ASTRA','SHOPEE','TRAVELOKA']" :key="c">
              <span class="text-2xl font-black text-slate-300 dark:text-slate-700" x-text="c"></span>
            </template>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- FEATURES -->
  <section id="features" class="py-24 px-6">
    <div class="max-w-7xl mx-auto">
      <div class="text-center max-w-2xl mx-auto mb-16">
        <span class="text-xs font-bold tracking-widest text-indigo-600 uppercase">Fitur Unggulan</span>
        <h2 class="text-4xl md:text-5xl font-black mt-3">Semua yang tim Anda butuhkan</h2>
        <p class="text-slate-500 mt-4">Dari pengarsipan sederhana hingga workflow kompleks — DocuCloud menangani semuanya dengan elegan.</p>
      </div>

      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template x-for="f in features" :key="f.title">
          <div class="card-hover bg-white dark:bg-slate-900 rounded-2xl p-7 border border-slate-200 dark:border-slate-800">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center mb-5" :style="`background:${f.bg}`">
              <i :data-lucide="f.icon" class="w-6 h-6" :style="`color:${f.color}`"></i>
            </div>
            <h3 class="text-lg font-bold mb-2" x-text="f.title"></h3>
            <p class="text-sm text-slate-500 leading-relaxed" x-text="f.desc"></p>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- HOW IT WORKS -->
  <section id="how" class="py-24 px-6 bg-slate-50 dark:bg-slate-900/50">
    <div class="max-w-5xl mx-auto">
      <div class="text-center mb-16">
        <span class="text-xs font-bold tracking-widest text-indigo-600 uppercase">Cara Kerja</span>
        <h2 class="text-4xl md:text-5xl font-black mt-3">Mulai dalam 3 langkah</h2>
      </div>

      <div class="relative">
        <div class="hidden md:block absolute left-1/2 top-0 bottom-0 w-0.5 bg-slate-200 dark:bg-slate-800 -translate-x-1/2"></div>

        <template x-for="(step, i) in steps" :key="i">
          <div class="relative mb-12 md:flex items-center" :class="i%2===0 ? 'md:flex-row' : 'md:flex-row-reverse'">
            <div class="md:w-1/2 px-6" :class="i%2===0 ? 'md:text-right' : 'md:text-left'">
              <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 border border-slate-200 dark:border-slate-800 inline-block max-w-md">
                <div class="flex items-center gap-3 mb-3" :class="i%2===0 ? 'md:flex-row-reverse' : ''">
                  <div class="w-10 h-10 rounded-xl gradient-bg flex items-center justify-center text-white font-bold" x-text="'0'+(i+1)"></div>
                  <h3 class="text-xl font-bold" x-text="step.title"></h3>
                </div>
                <p class="text-sm text-slate-500" x-text="step.desc"></p>
              </div>
            </div>
            <div class="hidden md:flex absolute left-1/2 -translate-x-1/2 w-12 h-12 gradient-bg rounded-full items-center justify-center text-white font-bold z-10 shadow-lg" x-text="i+1"></div>
            <div class="md:w-1/2"></div>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- PRICING -->
  <section id="pricing" class="py-24 px-6">
    <div class="max-w-7xl mx-auto">
      <div class="text-center mb-16">
        <span class="text-xs font-bold tracking-widest text-indigo-600 uppercase">Harga</span>
        <h2 class="text-4xl md:text-5xl font-black mt-3">Pilih paket yang tepat</h2>
        <p class="text-slate-500 mt-4">Mulai gratis, upgrade kapan saja sesuai kebutuhan tim.</p>
      </div>

      <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
        <template x-for="p in plans" :key="p.name">
          <div :class="p.popular ? 'gradient-bg text-white scale-105 shadow-2xl' : 'bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800'"
               class="card-hover rounded-2xl p-8 relative">
            <div x-show="p.popular" class="absolute -top-3 left-1/2 -translate-x-1/2 bg-yellow-400 text-slate-900 text-xs font-bold px-3 py-1 rounded-full">PALING POPULER</div>
            <h3 class="text-xl font-bold" x-text="p.name"></h3>
            <p class="text-sm opacity-80 mt-1" x-text="p.tagline"></p>
            <div class="mt-6 flex items-baseline gap-1">
              <span class="text-4xl font-black" x-text="p.price"></span>
              <span class="text-sm opacity-70">/bulan</span>
            </div>
            <ul class="mt-6 space-y-3">
              <template x-for="feat in p.features" :key="feat">
                <li class="flex items-start gap-2 text-sm">
                  <i data-lucide="check" class="w-4 h-4 flex-shrink-0 mt-0.5" :class="p.popular ? 'text-white' : 'text-green-500'"></i>
                  <span x-text="feat"></span>
                </li>
              </template>
            </ul>
            <button @click="showAuth = true; authTab='register'"
                    :class="p.popular ? 'bg-white text-indigo-600 hover:bg-slate-100' : 'gradient-bg text-white'"
                    class="w-full mt-8 py-3 rounded-xl font-semibold text-sm">
              Pilih Paket
            </button>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- TESTIMONIALS -->
  <section id="testimonials" class="py-24 px-6 bg-slate-50 dark:bg-slate-900/50">
    <div class="max-w-7xl mx-auto">
      <div class="text-center mb-16">
        <span class="text-xs font-bold tracking-widest text-indigo-600 uppercase">Testimoni</span>
        <h2 class="text-4xl md:text-5xl font-black mt-3">Dipuji oleh ribuan tim</h2>
      </div>

      <div class="grid md:grid-cols-3 gap-6">
        <template x-for="t in testimonials" :key="t.name">
          <div class="card-hover bg-white dark:bg-slate-900 rounded-2xl p-6 border border-slate-200 dark:border-slate-800">
            <div class="flex gap-1 mb-4">
              <template x-for="i in 5" :key="i"><i data-lucide="star" class="w-4 h-4 fill-yellow-400 text-yellow-400"></i></template>
            </div>
            <p class="text-sm leading-relaxed text-slate-600 dark:text-slate-300" x-text="`&quot;${t.quote}&quot;`"></p>
            <div class="flex items-center gap-3 mt-5 pt-5 border-t border-slate-100 dark:border-slate-800">
              <div class="w-10 h-10 rounded-full gradient-bg flex items-center justify-center text-white font-bold" x-text="t.name[0]"></div>
              <div>
                <p class="text-sm font-semibold" x-text="t.name"></p>
                <p class="text-xs text-slate-500" x-text="t.role"></p>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- FAQ -->
  <section id="faq" class="py-24 px-6">
    <div class="max-w-3xl mx-auto">
      <div class="text-center mb-12">
        <span class="text-xs font-bold tracking-widest text-indigo-600 uppercase">FAQ</span>
        <h2 class="text-4xl md:text-5xl font-black mt-3">Pertanyaan umum</h2>
      </div>

      <div class="space-y-3">
        <template x-for="(f, i) in faqs" :key="i">
          <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
            <button @click="openFaq = openFaq===i ? -1 : i" class="w-full flex items-center justify-between p-5 text-left">
              <span class="font-semibold" x-text="f.q"></span>
              <i :data-lucide="openFaq===i ? 'chevron-up' : 'chevron-down'" class="w-5 h-5 text-slate-400"></i>
            </button>
            <div x-show="openFaq===i" x-collapse class="px-5 pb-5 text-sm text-slate-500 leading-relaxed" x-text="f.a"></div>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="py-20 px-6">
    <div class="max-w-5xl mx-auto gradient-bg rounded-3xl p-12 md:p-16 text-center text-white relative overflow-hidden">
      <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
      <div class="absolute bottom-0 left-0 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
      <div class="relative">
        <h2 class="text-3xl md:text-5xl font-black">Siap modernisasi arsip Anda?</h2>
        <p class="mt-4 opacity-90 max-w-xl mx-auto">Bergabunglah dengan 500+ perusahaan yang sudah beralih ke DocuCloud. Gratis 14 hari, tanpa kartu kredit.</p>
        <button @click="showAuth = true; authTab='register'" class="mt-8 shine px-8 py-4 bg-white text-indigo-600 rounded-xl font-bold hover:bg-slate-100">
          Mulai Sekarang — Gratis
        </button>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="border-t border-slate-200 dark:border-slate-800 py-12 px-6">
    <div class="max-w-7xl mx-auto grid md:grid-cols-5 gap-8">
      <div class="md:col-span-2">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-9 h-9 rounded-xl gradient-bg flex items-center justify-center">
            <i data-lucide="cloud-cog" class="w-5 h-5 text-white"></i>
          </div>
          <span class="font-bold text-lg">DocuCloud</span>
        </div>
        <p class="text-sm text-slate-500 max-w-xs">Platform pengarsipan dokumen modern terintegrasi Google Drive untuk tim profesional.</p>
        <div class="flex gap-3 mt-5">
          <template x-for="s in ['twitter','linkedin','github','youtube']" :key="s">
            <a href="#" class="w-9 h-9 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center hover:bg-indigo-500 hover:text-white transition">
              <i :data-lucide="s" class="w-4 h-4"></i>
            </a>
          </template>
        </div>
      </div>
      <template x-for="col in footerCols" :key="col.title">
        <div>
          <h4 class="font-bold text-sm mb-4" x-text="col.title"></h4>
          <ul class="space-y-2">
            <template x-for="link in col.links" :key="link">
              <li><a href="#" class="text-sm text-slate-500 hover:text-indigo-600" x-text="link"></a></li>
            </template>
          </ul>
        </div>
      </template>
    </div>
    <div class="max-w-7xl mx-auto mt-10 pt-6 border-t border-slate-200 dark:border-slate-800 flex flex-col md:flex-row justify-between items-center gap-3 text-xs text-slate-500">
      <p>© 2026 DocuCloud. Hak cipta dilindungi.</p>
      <div class="flex gap-4">
        <a href="#" class="hover:text-indigo-600">Privasi</a>
        <a href="#" class="hover:text-indigo-600">Ketentuan</a>
        <a href="#" class="hover:text-indigo-600">Keamanan</a>
      </div>
    </div>
  </footer>
</div>
</template>

<!-- ================== PUBLIC DOCUMENT VIEW ================== -->
<template x-if="view === 'demo-doc'">
<div class="min-h-screen bg-slate-50 dark:bg-slate-950">
  <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">

    },
  }
}
</script>
